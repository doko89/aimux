name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build binaries
        run: |
          VERSION=${GITHUB_REF#refs/tags/}

          GOOS=linux   GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o aimux-linux-amd64 .
          GOOS=linux   GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o aimux-linux-arm64 .
          GOOS=darwin  GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o aimux-darwin-arm64 .
          GOOS=darwin  GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o aimux-darwin-amd64 .
          GOOS=windows GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o aimux-windows-amd64.exe .

      - name: Package
        run: |
          VERSION=${GITHUB_REF#refs/tags/}

          # Create zip archives
          for bin in aimux-linux-amd64 aimux-linux-arm64 aimux-darwin-arm64 aimux-darwin-amd64 aimux-windows-amd64.exe; do
            zip "${bin}-${VERSION}.zip" "$bin"
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            aimux-linux-amd64-${{ github.ref_name }}.zip
            aimux-linux-arm64-${{ github.ref_name }}.zip
            aimux-darwin-arm64-${{ github.ref_name }}.zip
            aimux-darwin-amd64-${{ github.ref_name }}.zip
            aimux-windows-amd64-${{ github.ref_name }}.zip
